<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a12">
<title>Tap Empire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a12;
  --surface: #12121e;
  --surface2: #1a1a2e;
  --surface3: #22223a;
  --border: #2a2a44;
  --text: #f0eeff;
  --text-dim: #9090b8;
  --text-faint: #555580;
  --accent: #7c6fff;
  --accent2: #ff6fa0;
  --good: #4fd9a0;
  --bad: #ff5757;
  --gold: #ffd84d;
  --radius: 14px;
  --font: 'Space Grotesk', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg); color: var(--text); font-family: var(--font);
  overscroll-behavior: none; user-select: none; -webkit-user-select: none;
}
#app {
  max-width: 480px; margin: 0 auto; height: 100vh; height: 100dvh;
  display: flex; flex-direction: column; position: relative; overflow: hidden;
}
.hidden { display: none !important; }
button { font-family: var(--font); cursor: pointer; }
::-webkit-scrollbar { width: 0; height: 0; }

/* ═══════════════════════════════════════════════════
   OS SELECTION SCREEN
═══════════════════════════════════════════════════ */
#osScreen {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 32px 24px; gap: 16px;
  background: radial-gradient(ellipse at 50% 0%, rgba(124,111,255,0.2) 0%, transparent 70%), var(--bg);
}
#osScreen .logo {
  font-size: 52px; margin-bottom: 8px;
  filter: drop-shadow(0 0 24px rgba(124,111,255,0.6));
  animation: logoFloat 3s ease-in-out infinite;
}
@keyframes logoFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
#osScreen h1 {
  font-size: 32px; font-weight: 800; letter-spacing: -0.03em;
  background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
#osScreen .tagline { color: var(--text-dim); font-size: 14px; text-align: center; }
#osScreen .os-grid { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 340px; margin-top: 8px; }
.os-btn {
  display: flex; align-items: center; gap: 14px; padding: 16px 20px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-size: 15px; font-weight: 600; transition: all 0.15s;
  text-align: left;
}
.os-btn:hover, .os-btn:active { border-color: var(--accent); background: var(--surface2); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,111,255,0.15); }
.os-btn .os-icon { font-size: 24px; width: 36px; text-align: center; }
.os-btn .os-name { flex: 1; }
.os-btn .os-arrow { color: var(--text-faint); font-size: 18px; }

/* iOS sub-options */
#iosSubScreen {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 32px 24px; gap: 16px;
  background: radial-gradient(ellipse at 50% 0%, rgba(124,111,255,0.2) 0%, transparent 70%), var(--bg);
}
#iosSubScreen h2 { font-size: 24px; font-weight: 700; text-align: center; }
#iosSubScreen p { color: var(--text-dim); font-size: 13px; text-align: center; max-width: 280px; }
.ios-opt-btn {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 20px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); width: 100%; max-width: 340px;
  transition: all 0.15s;
}
.ios-opt-btn:hover, .ios-opt-btn:active { border-color: var(--accent); background: var(--surface2); }
.ios-opt-btn .iopt-icon { font-size: 32px; }
.ios-opt-btn .iopt-name { font-size: 15px; font-weight: 700; }
.ios-opt-btn .iopt-desc { font-size: 12px; color: var(--text-dim); text-align: center; }
.back-btn {
  background: none; border: none; color: var(--text-dim); font-family: var(--mono);
  font-size: 12px; align-self: flex-start; padding: 4px 0;
  display: flex; align-items: center; gap: 6px;
}

/* ═══════════════════════════════════════════════════
   MODE SELECT
═══════════════════════════════════════════════════ */
#modeScreen {
  flex: 1; display: flex; flex-direction: column; padding: 20px 16px;
  background: radial-gradient(ellipse at 50% -10%, rgba(124,111,255,0.15) 0%, transparent 60%), var(--bg);
}
#modeScreen .screen-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
#modeScreen .screen-sub { color: var(--text-dim); font-size: 13px; margin-bottom: 16px; }
.mode-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 16px; }
.mode-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 16px; cursor: pointer; position: relative; overflow: hidden;
  transition: transform 0.1s, border-color 0.15s;
}
.mode-card::after {
  content: ''; position: absolute; inset: 0;
  background: var(--mc-color); opacity: 0.06; pointer-events: none;
  border-radius: 16px;
}
.mode-card:active { transform: scale(0.98); }
.mode-card .mc-icon { font-size: 32px; margin-bottom: 8px; display: block; }
.mode-card .mc-name {
  font-size: 16px; font-weight: 700; color: var(--mc-color, var(--text));
  display: flex; align-items: center; gap: 8px;
}
.mode-card .mc-tag {
  font-family: var(--mono); font-size: 9px; font-weight: 700;
  padding: 3px 7px; border-radius: 20px; background: var(--surface2);
  color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.05em;
}
.mode-card .mc-tag.active-tag { background: var(--mc-color, var(--accent)); color: #0a0a12; }
.mode-card .mc-desc { font-size: 12px; color: var(--text-dim); margin-top: 6px; line-height: 1.5; }
.mode-card .mc-badge {
  display: inline-flex; align-items: center; gap: 4px; margin-top: 10px;
  font-family: var(--mono); font-size: 10px; padding: 4px 10px;
  border-radius: 20px; background: var(--surface2); color: var(--text-faint);
  border: 1px solid var(--border);
}
.mode-card .mc-badge.has-save { background: var(--mc-color, var(--accent)); color: #0a0a12; border-color: transparent; }

/* theme select */
#themeScreen {
  flex: 1; display: flex; flex-direction: column; padding: 20px 16px;
}
#themeScreen .screen-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
#themeScreen .screen-sub { color: var(--text-dim); font-size: 13px; margin-bottom: 16px; }
.theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.theme-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 16px 12px; text-align: center; cursor: pointer; transition: 0.12s;
}
.theme-card:active { transform: scale(0.95); }
.theme-card .tc-icon { font-size: 30px; display: block; margin-bottom: 6px; }
.theme-card .tc-name { font-size: 13px; font-weight: 700; }
.theme-card .tc-curr { color: var(--text-faint); font-size: 11px; margin-top: 2px; }

/* ═══════════════════════════════════════════════════
   GAME SHELL
═══════════════════════════════════════════════════ */
#gameScreen { flex: 1; display: flex; flex-direction: column; min-height: 0; }

#gameHeader {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0; position: relative; z-index: 5;
}
#gameHeaderTop { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
#gameTitle { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: var(--text-dim); }
#gameTitle .gt-icon { font-size: 18px; }
#gameHeaderRight { display: flex; align-items: center; gap: 8px; }
#savePip { width: 7px; height: 7px; border-radius: 50%; background: var(--text-faint); transition: background 0.3s; }
#savePip.ok { background: var(--good); }
#savePip.err { background: var(--bad); }
#menuBtn {
  width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text-dim); font-size: 15px; display: flex;
  align-items: center; justify-content: center;
}
#moneyDisplay { font-family: var(--mono); font-size: 30px; font-weight: 700; letter-spacing: -0.01em; }
#rateDisplay { font-family: var(--mono); font-size: 12px; color: var(--accent); margin-top: 1px; }

#tabContent { flex: 1; overflow-y: auto; padding: 14px 14px 90px; position: relative; }
#toastsWrap { position: absolute; top: 6px; left: 0; right: 0; z-index: 50; pointer-events: none; display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 0 12px; }
.toast {
  background: var(--surface3); border: 1px solid var(--border); padding: 8px 14px;
  border-radius: 30px; font-size: 12px; font-weight: 600; max-width: 100%;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  animation: toastIn 0.2s ease, toastOut 0.3s ease 2.5s forwards;
}
@keyframes toastIn { from{opacity:0;transform:translateY(-10px);} to{opacity:1;transform:none;} }
@keyframes toastOut { to{opacity:0;transform:translateY(-10px);} }

#gameTabs {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; padding: 6px 4px calc(6px + env(safe-area-inset-bottom)); gap: 2px; z-index: 10;
}
.gtab {
  flex: 1; background: none; border: none; color: var(--text-faint);
  font-size: 10px; font-weight: 600; padding: 7px 2px 5px;
  border-radius: 10px; display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.gtab .ti { font-size: 18px; }
.gtab.active { color: var(--accent); background: rgba(124,111,255,0.12); }

/* ═══════════════════════════════════════════════════
   MAKE TAB — CLICKER
═══════════════════════════════════════════════════ */
#makeTab { display: flex; flex-direction: column; align-items: center; padding-top: 8px; position: relative; min-height: 400px; }
#clickArea { position: relative; margin: 16px 0 8px; }
#pressBtn {
  width: 160px; height: 160px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.25) 0%, var(--accent) 50%, #3a2fa0 100%);
  border: 4px solid rgba(124,111,255,0.5);
  box-shadow: 0 8px 0 rgba(60,40,160,0.6), 0 12px 40px rgba(124,111,255,0.3), 0 0 0 0 rgba(124,111,255,0.4);
  font-size: 68px; display: flex; align-items: center; justify-content: center;
  transition: transform 0.07s, box-shadow 0.07s;
}
#pressBtn:active {
  transform: translateY(6px);
  box-shadow: 0 2px 0 rgba(60,40,160,0.6), 0 4px 20px rgba(124,111,255,0.2), 0 0 0 0 rgba(124,111,255,0.4);
}
#clickTarget {
  font-size: 88px; cursor: pointer; transition: transform 0.08s; display: block;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5));
}
#clickTarget:active { transform: scale(0.86); }
#clickTarget.breaking { animation: breaker 0.4s forwards; }
@keyframes breaker { to{transform:rotate(20deg) scale(0.2);opacity:0;} }
.hp-track { width: 180px; height: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; margin-top: 14px; overflow: hidden; }
.hp-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--good)); transition: width 0.1s; border-radius: 6px; }
#targetLabel { margin-top: 6px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
#walkBox { display: flex; flex-direction: column; align-items: center; gap: 10px; padding-top: 20px; }
.walk-icon { font-size: 48px; animation: walkBob 0.5s ease-in-out infinite alternate; }
@keyframes walkBob { from{transform:translateY(0);} to{transform:translateY(-8px);} }
#walkLabel { font-size: 12px; color: var(--text-dim); }
.walk-track { width: 200px; height: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.walk-fill { height: 100%; width: 0; background: var(--accent); border-radius: 6px; }
#tapHint { color: var(--text-dim); font-size: 13px; text-align: center; margin-top: 6px; }
#tapPowerLine { font-family: var(--mono); font-size: 13px; color: var(--text); margin-top: 4px; }
.particle {
  position: absolute; pointer-events: none; font-family: var(--mono); font-weight: 700;
  color: var(--gold); font-size: 14px; animation: floatUp 0.85s ease-out forwards; z-index: 20;
}
@keyframes floatUp { 0%{opacity:1;transform:translate(-50%,0) scale(1);} 100%{opacity:0;transform:translate(-50%,-65px) scale(1.1);} }
#goldenOrb {
  position: absolute; width: 54px; height: 54px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #fff6cf, var(--gold) 70%);
  box-shadow: 0 0 0 0 rgba(255,216,77,0.6);
  display: flex; align-items: center; justify-content: center; font-size: 26px;
  cursor: pointer; z-index: 20; animation: goldPulse 1.1s ease-in-out infinite, goldIn 0.25s;
}
@keyframes goldPulse { 0%{box-shadow:0 0 0 0 rgba(255,216,77,0.55);} 70%{box-shadow:0 0 0 14px rgba(255,216,77,0);} 100%{box-shadow:0 0 0 0 rgba(255,216,77,0);} }
@keyframes goldIn { from{transform:scale(0);} to{transform:scale(1);} }
#frenzyBanner { font-family: var(--mono); font-size: 12px; color: var(--gold); text-align: center; min-height: 16px; margin-top: 10px; }
.auto-pills { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
.auto-pill {
  font-family: var(--mono); font-size: 10px; padding: 3px 9px; border-radius: 20px;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text-faint);
}
.auto-pill.live { color: var(--accent); border-color: rgba(124,111,255,0.4); }

/* ═══════════════════════════════════════════════════
   LUMBER INC
═══════════════════════════════════════════════════ */
#lumberGame {
  width: 100%; min-height: 400px; position: relative; display: flex; flex-direction: column; gap: 0;
}
.lumber-forest {
  background: linear-gradient(180deg, #0d1f0d 0%, #1a2e0f 60%, #1e3310 100%);
  border-radius: 14px; padding: 12px; position: relative; min-height: 160px;
  overflow: hidden; border: 1px solid #2a4020;
}
.forest-sky { position: absolute; top: 0; left: 0; right: 0; height: 40px; background: linear-gradient(180deg, #0a1628 0%, transparent 100%); }
.forest-row { display: flex; gap: 4px; align-items: flex-end; flex-wrap: wrap; min-height: 80px; position: relative; z-index: 2; padding-top: 24px; }
.tree-item { font-size: 28px; cursor: default; transition: transform 0.1s; display: inline-block; }
.tree-item.cutting { animation: treeCut 0.3s ease; }
@keyframes treeCut { 0%{transform:rotate(0);} 50%{transform:rotate(-10deg);} 100%{transform:rotate(0);} }
.tree-item.falling { animation: treeFall 0.5s ease forwards; }
@keyframes treeFall { to{transform:rotate(90deg) translateX(30px);opacity:0;} }
.forest-ground { height: 8px; background: #2d4a18; border-radius: 4px; margin-top: 8px; position: relative; z-index: 2; }
.lumber-pipeline {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 12px; margin-top: 10px;
}
.pipeline-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); margin-bottom: 10px; font-family: var(--mono); }
.pipeline-row {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  margin-bottom: 6px;
}
.pipeline-icon { font-size: 20px; width: 28px; text-align: center; }
.pipeline-info { flex: 1; }
.pipeline-name { font-size: 12px; font-weight: 700; }
.pipeline-rate { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 1px; }
.pipeline-bar { width: 70px; height: 6px; background: var(--surface3); border-radius: 4px; overflow: hidden; }
.pipeline-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
.lumber-money { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--good); }
.lumber-rate { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
.lumber-upgrades { margin-top: 10px; }
.upg-row {
  display: flex; align-items: center; gap: 10px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; margin-bottom: 8px;
}
.upg-icon { font-size: 22px; width: 30px; text-align: center; }
.upg-info { flex: 1; }
.upg-name { font-size: 13px; font-weight: 700; }
.upg-desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.upg-btn {
  flex-shrink: 0; min-width: 80px; padding: 8px 10px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface2); color: var(--text-faint);
  font-family: var(--mono); font-size: 11px; font-weight: 700; text-align: center;
}
.upg-btn.can { background: var(--accent); border-color: var(--accent); color: #fff; }
.upg-btn:disabled { opacity: 0.4; }

/* ═══════════════════════════════════════════════════
   MINE GAME
═══════════════════════════════════════════════════ */
#mineGame { width: 100%; }
.mine-scene {
  background: linear-gradient(180deg, #1a0e05 0%, #2d1a08 40%, #1f1206 100%);
  border-radius: 14px; padding: 12px; position: relative; min-height: 200px;
  border: 1px solid #4a2e10; overflow: hidden;
}
.shaft-container { display: flex; gap: 6px; justify-content: center; }
.mine-shaft {
  flex: 1; max-width: 80px; background: rgba(0,0,0,0.4); border-radius: 8px;
  overflow: hidden; position: relative; min-height: 160px;
  border: 1px solid rgba(255,165,0,0.2);
}
.shaft-label {
  position: absolute; top: 4px; left: 0; right: 0; text-align: center;
  font-family: var(--mono); font-size: 9px; color: #ffa040; font-weight: 700;
  text-transform: uppercase;
}
.shaft-miner {
  position: absolute; font-size: 20px; left: 50%; transform: translateX(-50%);
  transition: top 0.8s ease;
}
.shaft-ore {
  position: absolute; font-size: 16px; left: 50%; transform: translateX(-50%);
  transition: top 0.6s ease;
}
.elevator {
  background: rgba(255,140,0,0.15); border: 1px solid rgba(255,140,0,0.3);
  border-radius: 6px; padding: 6px; margin-top: 8px; display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: #ffa040;
}
.warehouse-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px; margin-top: 8px; display: flex; align-items: center; gap: 12px;
}
.wh-icon { font-size: 28px; }
.wh-info { flex: 1; }
.wh-title { font-size: 13px; font-weight: 700; }
.wh-stats { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.mine-upgrades { margin-top: 10px; }

/* ═══════════════════════════════════════════════════
   CAR DEALERSHIP
═══════════════════════════════════════════════════ */
#carGame { width: 100%; }
.showroom {
  background: linear-gradient(180deg, #0d1525 0%, #1a2540 100%);
  border-radius: 14px; padding: 12px; border: 1px solid #1e3060; position: relative; min-height: 180px;
}
.showroom-floor {
  position: absolute; bottom: 0; left: 0; right: 0; height: 30px;
  background: linear-gradient(180deg, transparent, rgba(0,100,255,0.05));
  border-top: 1px solid rgba(0,150,255,0.15);
}
.showroom-title { font-size: 11px; font-weight: 700; color: #4090ff; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.car-slots { display: flex; gap: 8px; flex-wrap: wrap; }
.car-slot {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; padding: 10px; flex: 1; min-width: 80px; text-align: center;
  position: relative;
}
.car-slot.locked { opacity: 0.4; }
.car-slot .car-emoji { font-size: 32px; display: block; margin-bottom: 4px; }
.car-slot .car-name { font-size: 11px; font-weight: 700; color: var(--text-dim); }
.car-slot .car-price { font-family: var(--mono); font-size: 10px; color: var(--gold); margin-top: 2px; }
.car-slot .car-status { font-size: 9px; font-family: var(--mono); color: var(--text-faint); margin-top: 2px; }
.car-slot.for-sale .car-status { color: var(--good); }
.car-inventory {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px; margin-top: 10px;
}
.inv-title { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-faint); font-family: var(--mono); margin-bottom: 8px; letter-spacing: 0.05em; }
.car-row {
  display: flex; align-items: center; gap: 10px; padding: 8px;
  background: var(--surface2); border-radius: 10px; margin-bottom: 6px;
}
.car-row-icon { font-size: 22px; }
.car-row-info { flex: 1; }
.car-row-name { font-size: 12px; font-weight: 700; }
.car-row-details { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 1px; }
.car-action-btn {

/* ══════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════ */
function fmt(n) {
  if (!n || isNaN(n)) return '0';
  if (n < 0) return '-' + fmt(-n);
  if (n < 1000) return Number.isInteger(n) ? n : Math.round(n*10)/10;
  const s=['','K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc'];
  let t=Math.floor(Math.log10(n)/3); if(t>=s.length)t=s.length-1;
  const sc=n/Math.pow(1000,t);
  return (sc<10?sc.toFixed(2):sc<100?sc.toFixed(1):sc.toFixed(0))+s[t];
}
function fmtMoney(n) { return n < 100000 ? '$'+Math.floor(n).toLocaleString('en-US') : '$'+fmt(n); }
function fmtMain(n, cfg) {
  const pref = cfg.currency==='$'||cfg.currency==='Credits' ? (cfg.currency==='$'?'$':'') : '';
  const suf = cfg.currency==='$'||cfg.currency==='Credits' ? (cfg.currency==='Credits'?' Cr':'') : ' '+cfg.currency;
  return pref + (n<100000?Math.floor(n).toLocaleString('en-US'):fmt(n)) + suf;
}
function getMode() { return GAME_MODES.find(m=>m.id===G.modeId)||GAME_MODES[0]; }
function getCfg() {
  const mode = getMode();
  if (mode.hasThemes) {
    const th = THEMES.find(t=>t.id===G.themeId)||THEMES[0];
    return {...mode, name:th.name, icon:th.icon, accent:th.accent, currency:th.currency,
      clickType:'press', actionSingular:'Tap', actionPlural:'Taps',
      producerLabel:'Workers', toolLabel:'Tap Power', producers:th.producers, toolNames:CLICK_NAMES};
  }
  return mode;
}
function totalOwned() { return G.producers.reduce((a,p)=>a+p.owned,0); }
function totalUpgsBought() {
  let n=G.clickUpg+G.globalUpg;
  G.producers.forEach(p=>n+=p.upgrades.filter(Boolean).length);
  return n;
}
function buildMult(i) { return Math.pow(2, G.producers[i].upgrades.filter(Boolean).length); }
function globalMult() {
  let m=1;
  m *= Math.pow(1.10, G.globalUpg);
  m *= (1 + Object.keys(G.achievements).length*0.005);
  m *= (1 + G.prestigePts*0.01);
  if (G.prestigeUpgs.efficientCrew) m *= 1.25;
  if (G.prestigeUpgs.masterCrafter) m *= 1.5;
  if (G.golden && G.golden.type==='frenzy' && Date.now()<G.golden.expiresAt) m *= G.golden.factor;
  return m;
}
function rawCps() {
  let t=0;
  PRODUCER_BASE.forEach((b,i)=>{ t+=b.cps*G.producers[i].owned*buildMult(i); });
  return t;
}
function effCps() { return rawCps()*globalMult(); }
function clickBase() {
  let p=1*Math.pow(2,G.clickUpg);
  if (G.prestigeUpgs.quickHands) p*=2;
  return p;
}
function effClick() {
  let g=clickBase()*globalMult();
  if (G.golden && G.golden.type==='clickFrenzy' && Date.now()<G.golden.expiresAt) g*=G.golden.factor;
  return g;
}
function addCurrency(n) {
  if(n<=0)return;
  G.currency+=n; G.lifetimeRun+=n; G.lifetimeAll+=n;
}
function producerCostN(i,n) {
  const b=PRODUCER_BASE[i].cost, owned=G.producers[i].owned;
  return Math.ceil(b*Math.pow(GROWTH,owned)*((Math.pow(GROWTH,n)-1)/(GROWTH-1)));
}
function buildUpgCost(i,idx) { return Math.ceil(PRODUCER_BASE[i].cost*BUILD_THRESH[idx]*3); }
function globalUpgCost(idx) { return Math.ceil(GLOBAL_THRESH[idx]*0.35); }
function pendingPP() { return Math.floor(Math.sqrt(G.lifetimeRun/100000)); }

/* ══════════════════════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════════════════════ */
function buyProducer(i) {
  const n=G.buyAmt, cost=producerCostN(i,n);
  if(G.currency>=cost){G.currency-=cost;G.producers[i].owned+=n;afterAction();}
}
function buyBuildUpg(i,idx) {
  const p=G.producers[i];
  if(p.upgrades[idx]||p.owned<BUILD_THRESH[idx])return;
  const cost=buildUpgCost(i,idx);
  if(G.currency>=cost){G.currency-=cost;p.upgrades[idx]=true;afterAction();}
}
function buyClickUpg() {
  if(G.clickUpg>=CLICK_COSTS.length)return;
  const cost=CLICK_COSTS[G.clickUpg];
  if(G.currency>=cost){G.currency-=cost;G.clickUpg++;afterAction();}
}
function buyGlobalUpg() {
  if(G.globalUpg>=GLOBAL_THRESH.length||G.lifetimeRun<GLOBAL_THRESH[G.globalUpg])return;
  const cost=globalUpgCost(G.globalUpg);
  if(G.currency>=cost){G.currency-=cost;G.globalUpg++;afterAction();}
}
function buyPrestigeUpg(id) {
  const def=PRESTIGE_UPGRADES.find(u=>u.id===id);
  if(!def||G.prestigeUpgs[id]||G.prestigePts<def.cost)return;
  G.prestigePts-=def.cost;G.prestigeUpgs[id]=true;afterAction();
}
function doAscend() {
  const earned=pendingPP();if(earned<1)return;
  G.prestigePts+=earned;G.ascendCount++;
  G.producers=PRODUCER_BASE.map(()=>({owned:0,upgrades:[false,false,false,false,false]}));
  G.clickUpg=0;G.globalUpg=0;G.lifetimeRun=0;
  G.currency=G.prestigeUpgs.headStart?5000:0;
  G.golden=null;afterAction();
  showToast('🌠 Ascended! +'+earned+' PP earned');saveState();
}

function checkAchs() {
  let any=false;
  ACH_DEFS.forEach(def=>{
    if(!G.achievements[def.id]){
      let pass=false;
      if(def.kind==='life') pass=G.lifetimeAll>=def.t;
      else if(def.kind==='click') pass=G.totalClicks>=def.t;
      else if(def.kind==='build') pass=totalOwned()>=def.t;
      else if(def.kind==='prestige') pass=G.ascendCount>=def.t;
      if(pass){G.achievements[def.id]=true;any=true;showToast('🏆 Achievement: '+fmt(def.t)+' '+def.kind);}
    }

  if(any&&currentTab==='stats')renderTab('stats');
}

/* ══════════════════════════════════════════════════════════
   AUTO-BUY
══════════════════════════════════════════════════════════ */
function runAutoBuy(){
  if(!G||!G.autoBuy)return;
  if(G.clickUpg<CLICK_COSTS.length&&G.currency>=CLICK_COSTS[G.clickUpg])buyClickUpg();
  if(G.globalUpg<GLOBAL_THRESH.length){
    const idx=G.globalUpg;
    if(G.lifetimeRun>=GLOBAL_THRESH[idx]&&G.currency>=globalUpgCost(idx))buyGlobalUpg();
  }
  PRODUCER_BASE.forEach((b,i)=>{
    const p=G.producers[i];const idx=p.upgrades.findIndex(x=>!x);
    if(idx!==-1&&p.owned>=BUILD_THRESH[idx]&&G.currency>=buildUpgCost(i,idx))buyBuildUpg(i,idx);
  });
  let guard=0;
  while(guard<40){guard++;let bought=false;
    for(let i=0;i<PRODUCER_BASE.length;i++){
      const cost=producerCostN(i,1);
      if(G.currency>=cost){G.currency-=cost;G.producers[i].owned+=1;bought=true;break;}
    }
    if(!bought)break;
  }
  refreshHeader();
  if(currentTab==='workers'||currentTab==='upgrades')renderTab(currentTab);
}

/* ══════════════════════════════════════════════════════════
   LUMBER INC SIMULATION
══════════════════════════════════════════════════════════ */
function tickLumber(dt){
  // Cut trees
  LUMBER.cutTimer+=dt;
  const cutInterval=2.5/LUMBER.lumberjackSpeed;
  while(LUMBER.cutTimer>=cutInterval&&LUMBER.trees>0){
    LUMBER.cutTimer-=cutInterval;
    LUMBER.trees--;LUMBER.logs+=LUMBER.lumberjacks*2;
    if(LUMBER.trees===0)setTimeout(reforest,5000);
  }
  // Trucks move logs to sawmill
  LUMBER.truckTimer+=dt;
  const truckInterval=3/LUMBER.truckSpeed;
  while(LUMBER.truckTimer>=truckInterval&&LUMBER.logs>0){
    LUMBER.truckTimer-=truckInterval;
    const moved=Math.min(LUMBER.logs,LUMBER.trucks*5);
    LUMBER.logs-=moved;LUMBER.lumber+=moved;
  }
  // Machines process lumber to cash
  LUMBER.machineTimer+=dt;
  const machineInterval=2/LUMBER.machineSpeed;
  while(LUMBER.machineTimer>=machineInterval&&LUMBER.lumber>0){
    LUMBER.machineTimer-=machineInterval;
    const processed=Math.min(LUMBER.lumber,LUMBER.machines*3);
    LUMBER.lumber-=processed;
    const earned=processed*LUMBER.saleValue;
    LUMBER.money+=earned;LUMBER.earned+=earned;
    if(G){G.currency=LUMBER.money;}
  }
}
function reforest(){
  LUMBER.trees=Math.min(12+LUMBER.zones*8,LUMBER.maxTrees);
  if(currentTab==='play')renderLumberPlay();
}
function lumberRate(){return LUMBER.machines*3*LUMBER.saleValue*(LUMBER.machineSpeed/2);}

/* ══════════════════════════════════════════════════════════
   MINE SIMULATION
══════════════════════════════════════════════════════════ */
let mineTimer=0;
function tickMine(dt){
  mineTimer+=dt;
  if(mineTimer<0.5)return;mineTimer=0;
  MINE.shafts.forEach((s,i)=>{
    if(!s.active||s.depth<1)return;
    s.ore+=s.miner*(0.5+s.depth*0.3);
  });
  // Elevator picks up ore
  const totalOre=MINE.shafts.reduce((a,s)=>a+s.ore,0);
  const pickup=Math.min(totalOre,MINE.elevator.speed*5);
  let remaining=pickup;
  MINE.shafts.forEach(s=>{
    if(remaining<=0)return;const take=Math.min(s.ore,remaining);s.ore-=take;remaining-=take;
  });
  MINE.elevator.carrying=Math.min(MINE.elevator.carrying+pickup,MINE.elevator.load);
  // Warehouse sells
  if(MINE.elevator.carrying>0){
    const sold=Math.min(MINE.elevator.carrying,MINE.warehouse.sellSpeed*3);
    MINE.elevator.carrying-=sold;
    const earned=sold*(2+MINE.shafts.filter(s=>s.active).reduce((a,s)=>a+s.depth,0)*0.5);
    MINE.money+=earned;MINE.earned+=earned;
    if(G)G.currency=MINE.money;
  }
}
function mineRate(){return MINE.warehouse.sellSpeed*3*(2+MINE.shafts.filter(s=>s.active).reduce((a,s)=>a+s.depth,0)*0.5)*2;}

let spaceCanvas=null,spaceCtx=null;
let stars=[];let shipAngle=0;
function initSpace(){
  spaceCanvas=document.getElementById('spaceCanvas');
  if(!spaceCanvas)return;
  spaceCtx=spaceCanvas.getContext('2d');
  spaceCanvas.width=spaceCanvas.offsetWidth;
  spaceCanvas.height=spaceCanvas.offsetHeight;
  stars=[];for(let i=0;i<80;i++){stars.push({x:Math.random()*spaceCanvas.width,y:Math.random()*spaceCanvas.height,r:Math.random()*1.5+0.3,twinkle:Math.random()*Math.PI*2});}
  drawSpace();
}
function drawSpace(){
  if(!spaceCtx||!spaceCanvas)return;
  const w=spaceCanvas.width,h=spaceCanvas.height;
  spaceCtx.fillStyle='#000510';spaceCtx.fillRect(0,0,w,h);
  // Stars
  stars.forEach(s=>{
    s.twinkle+=0.02;const alpha=0.5+Math.sin(s.twinkle)*0.4;
    spaceCtx.fillStyle=`rgba(200,220,255,${alpha})`;
    spaceCtx.beginPath();spaceCtx.arc(s.x,s.y,s.r,0,Math.PI*2);spaceCtx.fill();
  });
  // Planets
  const planets=SPACE.planets.filter(p=>p.discovered);
  planets.forEach((p,i)=>{
    const x=40+i*(w/Math.max(planets.length,1))*0.8+20;const y=h*0.35+Math.sin(Date.now()/2000+i)*15;
    const colors={'🔴':'#c0392b','🔵':'#2980b9','🟡':'#f1c40f','🟢':'#27ae60'};
    const color=colors[p.icon]||'#7f8c8d';
    const grad=spaceCtx.createRadialGradient(x-5,y-5,3,x,y,20);
    grad.addColorStop(0,'white');grad.addColorStop(0.3,color);grad.addColorStop(1,'rgba(0,0,0,0.8)');
    spaceCtx.fillStyle=grad;spaceCtx.beginPath();spaceCtx.arc(x,y,18,0,Math.PI*2);spaceCtx.fill();
    spaceCtx.fillStyle='rgba(255,255,255,0.8)';spaceCtx.font='10px monospace';
    spaceCtx.textAlign='center';spaceCtx.fillText(p.name,x,y+30);
  });
  // Ship
  shipAngle+=0.01;
  const sx=w*0.7+Math.cos(shipAngle)*30;const sy=h*0.6+Math.sin(shipAngle)*15;
  spaceCtx.font='22px serif';spaceCtx.textAlign='center';spaceCtx.fillText('🛸',sx,sy);
  // Glow
  const grd=spaceCtx.createRadialGradient(w/2,h/2,20,w/2,h/2,h);
  grd.addColorStop(0,'rgba(60,40,150,0.05)');grd.addColorStop(1,'transparent');
  spaceCtx.fillStyle=grd;spaceCtx.fillRect(0,0,w,h);
}
let spaceDrawTimer=0;
function tickSpace(dt){
  spaceDrawTimer+=dt;
  if(spaceDrawTimer>0.05){spaceDrawTimer=0;drawSpace();}
  SPACE.ships.forEach(ship=>{
    const planet=SPACE.planets.find(p=>p.name===ship.target);
    if(!planet||!planet.discovered)return;
    const mined=ship.mining*planet.yield*dt;
    SPACE.credits+=mined;SPACE.earned+=mined;
    if(G)G.currency=SPACE.credits;
  });
}
function spaceRate(){return SPACE.ships.reduce((a,s)=>{const p=SPACE.planets.find(pl=>pl.name===s.target);return a+(p?s.mining*p.yield:0);},0);}

let lastTick=performance.now();
function gameTick(now){
  animFrameId=requestAnimationFrame(gameTick);
  const dt=Math.min((now-lastTick)/1000,0.2);lastTick=now;
  if(!G)return;
  const mode=G.modeId;
  if(mode==='clicker'||mode==='knockout'){
    addCurrency(effCps()*dt);
    if(G.golden&&Date.now()>=G.golden.expiresAt)G.golden=null;
    tickCount++;
    if(tickCount%30===0)checkAchs();
    if(G.autoTap)doClick(null);
  } else if(mode==='lumber'){tickLumber(dt);}
  else if(mode==='miner'){tickMine(dt);}
  else if(mode==='dealership'){tickCar(dt);}
  else if(mode==='space'){tickSpace(dt);}
  // Refresh every ~100ms
  if(now % 100 < 20) refreshHeader();
}
requestAnimationFrame(gameTick);

const SAVE_KEY='tapEmpireV3_';
function saveState(){
  if(!G)return;
  try{
    G.lastSaved=Date.now();
    const save={G,LUMBER,MINE,CAR,SPACE};
    localStorage.setItem(SAVE_KEY+G.modeId,JSON.stringify(save));
    flashPip(true);
  }catch(e){flashPip(false);}
}
function loadFor(modeId){
  try{const r=localStorage.getItem(SAVE_KEY+modeId);return r?JSON.parse(r):null;}catch(e){return null;}
}
function hasSave(modeId){try{return !!localStorage.getItem(SAVE_KEY+modeId);}catch(e){return false;}}
function deleteSave(modeId){try{localStorage.removeItem(SAVE_KEY+modeId);}catch(e){}}
function flashPip(ok){
  const p=document.getElementById('savePip');if(!p)return;
  p.classList.remove('ok','err');p.classList.add(ok?'ok':'err');
  setTimeout(()=>p.classList.remove('ok','err'),1200);
}
let autosaveInt=null;
function startAutosave(){
  if(autosaveInt)clearInterval(autosaveInt);
  autosaveInt=setInterval(saveState,15000);
  document.addEventListener('visibilitychange',()=>{if(document.hidden)saveState();});
  window.addEventListener('beforeunload',()=>{saveState();});
}

function pickMode(modeId){
  const mode=GAME_MODES.find(m=>m.id===modeId);
  const existing=loadFor(modeId);
  if(existing){
    restoreState(existing,modeId,true);
  } else if(mode.hasThemes){
    pendingModeId=modeId;renderThemeGrid();showScreen('theme');
  } else {
    enterMode(modeId,null,false);
  }
}
function pickTheme(themeId){enterMode(pendingModeId,themeId,false);}
function restoreState(save,modeId,resume){
  G=save.G;
  if(modeId==='lumber'&&save.LUMBER)Object.assign(LUMBER,save.LUMBER);
  if(modeId==='miner'&&save.MINE)Object.assign(MINE,save.MINE);
  if(modeId==='dealership'&&save.CAR)Object.assign(CAR,save.CAR);
  if(modeId==='space'&&save.SPACE)Object.assign(SPACE,save.SPACE);
  enterGame(resume,save.G.lastSaved);
}
function enterMode(modeId,themeId,resume){
  G=freshState(modeId,themeId);

  if(modeId==='lumber'){Object.assign(LUMBER,{trees:12,maxTrees:20,logs:0,lumber:0,lumberjackSpeed:1,truckSpeed:1,machineSpeed:1,saleValue:3,lumberjacks:1,trucks:1,machines:1,cutTimer:0,truckTimer:0,machineTimer:0,zones:1,money:0,earned:0,upgrades:{speed1:false,truck1:false,machine1:false,sale1:false,speed2:false,truck2:false,machine2:false,sale2:false,zone2:false}});G.currency=0;}
  if(modeId==='miner'){Object.assign(MINE,{shafts:[{depth:1,ore:0,miner:0.5,active:true},{depth:0,ore:0,miner:0,active:false},{depth:0,ore:0,miner:0,active:false}],elevator:{speed:1,load:10,carrying:0},warehouse:{capacity:200,stored:0,sellSpeed:1},money:0,earned:0,upgrades:{miner1:false,miner2:false,elev1:false,elev2:false,wh1:false,wh2:false,shaft2:false,shaft3:false}});G.currency=0;}
  if(modeId==='dealership'){Object.assign(CAR,{money:15000,earned:0,reputation:1,inventory:[],showroom:[{unlocked:true},{unlocked:true},{unlocked:false},{unlocked:false}],staff:{sales:1,mechanics:0,marketers:0},negotiation:null,upgrades:{staff1:false,staff2:false,showroom3:false,showroom4:false,marketing:false,prestige:false}});G.currency=15000;}
  if(modeId==='space'){Object.assign(SPACE,{credits:500,earned:0,ships:[{name:'Scout',icon:'🛸',level:1,mining:0.5,speed:1,target:'Mars'}],planets:[{name:'Mars',icon:'🔴',yield:2,discovered:true},{name:'Europa',icon:'🔵',yield:5,discovered:false},{name:'Titan',icon:'🟡',yield:12,discovered:false},{name:'Kepler',icon:'🟢',yield:30,discovered:false}],upgrades:{thrust1:false,cargo1:false,scanner1:false,thrust2:false,cargo2:false,warpDrive:false}});G.currency=500;}
  enterGame(resume,null);
}
function enterGame(resume,prevSaved){
  if(!G.firstPlayed)G.firstPlayed=Date.now();
  applyAccent();
  showScreen('game');switchTab('play');
  if(getMode().clickType==='target')spawnTarget();
  scheduleGolden();
  if(resume&&prevSaved){
    const elapsed=Math.min((Date.now()-prevSaved)/1000,4*3600);
    if(elapsed>=30){
      const modeId=G.modeId;
      let rate=0;
      if(modeId==='clicker'||modeId==='knockout')rate=effCps();
      else if(modeId==='lumber')rate=lumberRate();
      else if(modeId==='miner')rate=mineRate();
      else if(modeId==='dealership')rate=carRate();
      else if(modeId==='space')rate=spaceRate();
      const earned=rate*elapsed*0.4;
      if(earned>0){
        G.currency+=earned;
        const mins=Math.round(elapsed/60);
        openModal(`<h3>Welcome back! 👋</h3><p>You were away for ${mins<1?'under a minute':mins+' min'}. Your operation earned <strong style="color:var(--accent)">${fmtMoney(earned)}</strong> at half rate.</p><div class="modal-btns"><button class="m-confirm" onclick="closeModal()">Nice!</button></div>`);
      }
    }
  } else {saveState();}
  // Init space canvas if needed
  if(G.modeId==='space')setTimeout(initSpace,100);
  startAutosave();
}
function applyAccent(){
  if(!G)return;
  const mode=GAME_MODES.find(m=>m.id===G.modeId);
  let accent=mode?mode.color:'#7c6fff';
  if(mode&&mode.hasThemes){const th=THEMES.find(t=>t.id===G.themeId)||THEMES[0];accent=th.accent;}
  document.documentElement.style.setProperty('--accent',accent);
}

    if(!s.active)return `<div class="mine-shaft" style="opacity:0.3;align-items:center;justify-content:center;display:flex;"><span style="font-size:11px;color:var(--text-faint);">Locked</span></div>`;
    const minerY=40+Math.sin(Date.now()/800+i)*10;
    return `<div class="mine-shaft">
      <div class="shaft-label">Shaft ${i+1} (D${s.depth})</div>
      <div class="shaft-miner" style="top:${minerY}px">⛏️</div>
      <div class="shaft-ore" style="top:${90+i*8}px;font-size:${12+i*2}px">${Math.floor(s.ore)>0?'🪨×'+Math.floor(s.ore):''}</div>
    </div>`;
  }).join('');
  const elevPct=Math.min(100,(MINE.elevator.carrying/MINE.elevator.load)*100);
  return `<div id="mineGame">
    <div class="mine-scene">
      <div class="shaft-container">${shaftsHTML}</div>
      <div class="elevator">
        🛗 Elevator carrying ${Math.floor(MINE.elevator.carrying)}/${MINE.elevator.load} ore
        <div style="flex:1;height:6px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;">
          <div style="height:100%;width:${elevPct}%;background:#ffa040;border-radius:4px;transition:width 0.3s;"></div>
        </div>
      </div>
    </div>
    <div class="warehouse-box">
      <div class="wh-icon">🏭</div>
      <div class="wh-info">
        <div class="wh-title">Ore Processing Warehouse</div>
        <div class="wh-stats">Selling at ×${MINE.warehouse.sellSpeed} speed • ~$${fmt(mineRate())}/sec</div>
      </div>
      <div style="text-align:right;">
        <div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--gold)">${fmtMoney(MINE.money)}</div>
        <div style="font-size:11px;color:var(--text-dim)">Total</div>
      </div>
    </div>
  </div>`;
}
function renderMineWorkers(){
  const upgs=[
    {key:'miner1',name:'Miner Speed I',desc:'Miners dig 2× faster',cost:1000,icon:'⛏️'},
    {key:'miner2',name:'Miner Speed II',desc:'Miners dig 3× faster total',cost:8000,icon:'💎',req:'miner1'},
    {key:'elev1',name:'Elevator Speed',desc:'Elevator moves 2× faster',cost:3000,icon:'🛗'},
    {key:'elev2',name:'Elevator Capacity',desc:'Elevator holds 3× more ore',cost:12000,icon:'📦',req:'elev1'},
    {key:'wh1',name:'Warehouse Efficiency',desc:'Sell 2× faster',cost:5000,icon:'🏭'},
    {key:'wh2',name:'Premium Processing',desc:'Sell 3× faster total',cost:25000,icon:'⚡',req:'wh1'},
    {key:'shaft2',name:'Shaft 2',desc:'Open a second mine shaft (+ore)',cost:8000,icon:'🪨'},
    {key:'shaft3',name:'Shaft 3',desc:'Open a third mine shaft (+more ore)',cost:30000,icon:'🌑',req:'shaft2'},
  ];
  return upgs.map(u=>{
    const bought=MINE.upgrades[u.key];
    const locked=u.req&&!MINE.upgrades[u.req];
    const can=!bought&&!locked&&MINE.money>=u.cost;
    return `<div class="upg-row">
      <div class="upg-icon">${u.icon}</div>
      <div class="upg-info"><div class="upg-name">${u.name}</div><div class="upg-desc">${locked?'🔒 Unlock '+u.req+' first':u.desc}</div></div>
      <button class="upg-btn ${can?'can':''}" ${bought?'disabled':''} onclick="buyMineUpg('${u.key}',${u.cost})">${bought?'✅':locked?'🔒':fmtMoney(u.cost)}</button>
    </div>`;
  }).join('');
}
function buyMineUpg(key,cost){
  if(MINE.upgrades[key]||MINE.money<cost)return;
  MINE.money-=cost;if(G)G.currency=MINE.money;
  MINE.upgrades[key]=true;
  if(key==='miner1')MINE.shafts.forEach(s=>{if(s.active)s.miner*=2;});
  if(key==='miner2')MINE.shafts.forEach(s=>{if(s.active)s.miner*=1.5;});
  if(key==='elev1')MINE.elevator.speed*=2;
  if(key==='elev2')MINE.elevator.load*=3;
  if(key==='wh1')MINE.warehouse.sellSpeed*=2;
  if(key==='wh2')MINE.warehouse.sellSpeed*=1.5;
  if(key==='shaft2'){MINE.shafts[1].active=true;MINE.shafts[1].depth=2;MINE.shafts[1].miner=0.5*(MINE.upgrades.miner1?2:1)*(MINE.upgrades.miner2?1.5:1);}
  if(key==='shaft3'){MINE.shafts[2].active=true;MINE.shafts[2].depth=4;MINE.shafts[2].miner=0.8*(MINE.upgrades.miner1?2:1)*(MINE.upgrades.miner2?1.5:1);}
  showToast('✅ Upgrade applied!');afterAction();
}
function renderMineUpgrades(){return renderMineWorkers();}

function renderUpgrades(){
  const cfg=getCfg();
  let html=`<div class="sec-label">${cfg.toolLabel}</div>`;
  const ci=G.clickUpg;
  if(ci<CLICK_COSTS.length){
    const cost=CLICK_COSTS[ci],afford=G.currency>=cost;
    html+=`<div class="upg-card-g"><div class="uc-icon">👆</div><div class="uc-info"><div class="uc-name">${cfg.toolNames[ci]}</div><div class="uc-desc">Doubles ${cfg.actionSingular?.toLowerCase()||'click'} power. Currently ×${Math.round(clickBase())}.</div></div>
      <button class="buy-btn-w ${afford?'can':''}" onclick="buyClickUpg()">${fmt(cost)}</button></div>`;
  } else {
    html+=`<div class="upg-card-g bought"><div class="uc-icon">✅</div><div class="uc-info"><div class="uc-name">Maxed!</div><div class="uc-desc">All ${cfg.toolLabel?.toLowerCase()||'tool'} upgrades purchased.</div></div></div>`;
  }

  PRODUCER_BASE.forEach((b,i)=>{
    const p=G.producers[i];const [name,icon]=cfg.producers[i];
    const nextIdx=p.upgrades.findIndex(x=>!x);
    if(nextIdx===-1){html+=`<div class="upg-card-g bought"><div class="uc-icon">${icon}</div><div class="uc-info"><div class="uc-name">${name} — Maxed</div><div class="uc-desc">×32 output. Fully upgraded.</div></div></div>`;return;}
    const need=BUILD_THRESH[nextIdx];const locked=p.owned<need;
    const cost=buildUpgCost(i,nextIdx);const afford=!locked&&G.currency>=cost;
    html+=`<div class="upg-card-g ${locked?'locked':''}"><div class="uc-icon">${icon}</div><div class="uc-info">
      <div class="uc-name">${name} Upgrade ${nextIdx+1}/5</div>
      <div class="uc-desc">${locked?'Hire '+need+' to unlock (have '+p.owned+')':'Doubles '+name+' output.'}</div></div>
      ${locked?'<button class="buy-btn-w" disabled>🔒</button>':`<button class="buy-btn-w ${afford?'can':''}" onclick="buyBuildUpg(${i},${nextIdx})">${fmt(cost)}</button>`}
    </div>`;
  });
  html+=`<div class="sec-label">Production Boosts</div>`;
  GLOBAL_THRESH.forEach((t,i)=>{
    const bought=i<G.globalUpg;const locked=!bought&&G.lifetimeRun<t;
    if(bought){html+=`<div class="upg-card-g bought"><div class="uc-icon">✅</div><div class="uc-info"><div class="uc-name">${GLOBAL_NAMES[i]}</div><div class="uc-desc">+10% global production — active.</div></div></div>`;return;}
    const cost=globalUpgCost(i);const afford=!locked&&G.currency>=cost;
    html+=`<div class="upg-card-g ${locked?'locked':''}"><div class="uc-icon">📊</div><div class="uc-info"><div class="uc-name">${GLOBAL_NAMES[i]}</div>
      <div class="uc-desc">${locked?'Unlocks at '+fmt(t)+' lifetime earned':'+10% global production'}</div></div>
      ${locked?'<button class="buy-btn-w" disabled>🔒</button>':`<button class="buy-btn-w ${afford?'can':''}" onclick="buyGlobalUpg()">${fmt(cost)}</button>`}
    </div>`;
  });
  return html;
}

  <div class="ach-grid">${ACH_DEFS.map(d=>`<div class="ach-tile ${G.achievements[d.id]?'':'locked'}">${d.icon}</div>`).join('')}</div>`;
  html+=`<div class="prestige-panel">
    <div style="font-family:var(--mono);font-size:11px;color:var(--text-faint);margin-bottom:4px;">PRESTIGE POINTS</div>
    <div class="prestige-pp">${G.prestigePts} PP <span style="font-size:13px;font-weight:500;color:var(--text-dim)">(+${G.prestigePts}% prod)</span></div>
    <div class="prestige-desc">Ascending grants <strong style="color:var(--accent)">+${pendingPP()} PP</strong>, resets run. Achievements & PP upgrades stay.</div>
    <button class="primary-btn" ${pendingPP()<1?'disabled':''} onclick="confirmAscend()">Ascend (${pendingPP()<1?'need more progress':'+'+pendingPP()+' PP'})</button>
  </div>
  <div class="sec-label">Prestige Upgrades</div>`;
  PRESTIGE_UPGRADES.forEach(u=>{
    const bought=!!G.prestigeUpgs[u.id];const afford=!bought&&G.prestigePts>=u.cost;
    html+=`<div class="upg-card-g ${bought?'bought':''}">
      <div class="uc-icon">${u.icon}</div>
      <div class="uc-info"><div class="uc-name">${u.name}</div><div class="uc-desc">${u.desc}</div></div>
      ${bought?'<button class="buy-btn-w" disabled>✅</button>':`<button class="buy-btn-w ${afford?'can':''}" onclick="buyPrestigeUpg('${u.id}')">${u.cost} PP</button>`}
    </div>`;
  });
  html+=`<button class="danger-btn" onclick="confirmReset()">🗑️ Reset This Save</button>`;
  return html;
}

/* ══════════════════════════════════════════════════════════
   TOASTS / MODALS
══════════════════════════════════════════════════════════ */
function showToast(text){
  const wrap=document.getElementById('toastsWrap');if(!wrap)return;
  const t=document.createElement('div');t.className='toast';t.textContent=text;
  wrap.appendChild(t);setTimeout(()=>t.remove(),3000);
}
function openModal(html){
  let layer=document.getElementById('modalLayer');
  if(!layer){layer=document.createElement('div');layer.id='modalLayer';document.getElementById('app').appendChild(layer);}
  layer.innerHTML='<div class="modal">'+html+'</div>';layer.classList.remove('hidden');
}
function closeModal(){const l=document.getElementById('modalLayer');if(l)l.remove();}
function confirmAscend(){
  const pp=pendingPP();
  openModal(`<h3>Ascend to the Stars? 🌠</h3><p>Your run resets to zero, but you keep achievements and prestige upgrades. You'll earn <strong style="color:var(--accent)">+${pp} Prestige Points</strong> — a permanent +${pp}% production boost.</p><div class="modal-btns"><button onclick="closeModal()">Cancel</button><button class="m-confirm" onclick="closeModal();doAscend()">Ascend!</button></div>`);
}
function confirmReset(){
  openModal(`<h3>Delete Save? ⚠️</h3><p>This permanently deletes all progress for this game mode — currency, workers, upgrades, achievements, prestige. Cannot be undone.</p><div class="modal-btns"><button onclick="closeModal()">Cancel</button><button class="m-danger" onclick="resetGame()">Delete</button></div>`);
}
function openMenu(){
  const mode=getMode();
  let html=`<h3>Menu</h3>`;
  if(mode.hasThemes){
    html+=`<div class="menu-label">Reskin as…</div><div class="menu-mini-themes">${THEMES.map(t=>`<button class="mmt ${t.id===G.themeId?'active':''}" onclick="switchTheme('${t.id}')">${t.icon}</button>`).join('')}</div>`;
  }
  if(mode.id==='clicker'||mode.id==='knockout'){
    html+=`<div class="menu-label">Automation</div>
      <div class="menu-row"><span>Auto-Buyer</span><div class="toggle ${G.autoBuy?'on':''}" onclick="toggleAutoBuy()"></div></div>
      <div class="menu-row"><span>Auto-Tapper</span><div class="toggle ${G.autoTap?'on':''}" onclick="toggleAutoTap()"></div></div>`;
  }
  html+=`<div class="menu-label">Game</div>
    <button class="menu-nav-btn" onclick="goToModes()">← Switch Game Mode</button>
    <button class="primary-btn" onclick="closeModal()">Close</button>`;
  openModal(html);
}
function switchTheme(id){G.themeId=id;applyAccent();afterAction();openMenu();saveState();}
function toggleAutoBuy(){G.autoBuy=!G.autoBuy;openMenu();saveState();}
function toggleAutoTap(){G.autoTap=!G.autoTap;openMenu();saveState();}

   BOOT
══════════════════════════════════════════════════════════ */

const exposed = {
  showScreen, selectOS, selectiOSMode,
  pickMode, pickTheme, switchTab, openMenu,
  closeModal, confirmAscend, confirmReset, resetGame,
  doClick, goToModes, buyProducer, buyBuildUpg, buyClickUpg, buyGlobalUpg,
  buyPrestigeUpg, setAmt, toggleAutoBuy, toggleAutoTap, switchTheme,
  sellCar, negotiateAccept, negotiateCounter, negotiateDrop, buyCarInventory,
  hireCarStaff, buyLumberUpg, buyMineUpg, buyCarUpg, buySpaceUpg, launchShip,
  setSpaceTarget, upgradeShip
};
Object.assign(window, exposed);

showScreen('os');
startAutosave();

})();
</script>
